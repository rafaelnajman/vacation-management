services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vacations_test
      POSTGRES_USER: vacations
      POSTGRES_PASSWORD: vacations
    ports: ["5433:5432"]
    tmpfs: ["/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vacations -d vacations_test"]
      interval: 2s
      timeout: 2s
      retries: 10
